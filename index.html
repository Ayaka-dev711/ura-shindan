<html lang="ja">
<head>
<meta charset="UTF-8">

<style>

  :root {
    --bg: #0a0a0f;
    --card: rgba(18, 18, 30, 0.85);
    --accent: #ff3366;
    --accent2: #7c3aed;
    --accent3: #06d6a0;
    --gold: #fbbf24;
    --text: #e8e6f0;

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {

    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-orbs {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none;
  }
  .orb {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3;
    animation: float 12s ease-in-out infinite;
  }
  .orb:nth-child(1) { width: 400px; height: 400px; background: #7c3aed; top: -100px; left: -100px; animation-delay: 0s; }
  .orb:nth-child(2) { width: 350px; height: 350px; background: #ff3366; bottom: -80px; right: -80px; animation-delay: -4s; }
  .orb:nth-child(3) { width: 300px; height: 300px; background: #06d6a0; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -8s; }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -30px) scale(1.05); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }

  .container {
    position: relative; z-index: 1;
    max-width: 520px; margin: 0 auto; padding: 24px 16px;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  .screen { display: none; width: 100%; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  .logo-kanji {

    font-size: 72px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1; text-align: center;
    animation: breathe 3s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.2); }

    font-size: 14px; color: var(--dim); letter-spacing: 6px;

  .tagline em {

    border: 1px solid rgba(255,255,255,0.12);
    color: var(--text); padding: 14px 12px;
    border-radius: 12px; font-size: 16px;

// ===== セレクトボックス初期化 =====
(() => {
  const ySel = document.getElementById('sel-year');
  const mSel = document.getElementById('sel-month');
  const dSel = document.getElementById('sel-day');
  for (let y = 2010; y >= 1940; y--) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    if (y === 1990) o.selected = true;
    ySel.appendChild(o);
  }
  for (let m = 1; m <= 12; m++) {
    const o = document.createElement('option');
    o.value = m; o.textContent = m;
    mSel.appendChild(o);
  }
  for (let d = 1; d <= 31; d++) {
    const o = document.createElement('option');
    o.value = d; o.textContent = d;
    dSel.appendChild(o);
  }
})();

// ===== 日干（十干）計算 =====
// 算命学では日柱の天干（日干）がその人の本質を表す
// 六十干支の計算: 基準日からの日数差で求める
function calcDayKan(year, month, day) {
  // 基準日: 1900年1月1日 = 庚子（干の番号0=甲,1=乙,..., 庚=6）
  // 1900-01-01 の日干は「庚」(index 6)
  const baseDate = new Date(1900, 0, 1);
  const targetDate = new Date(year, month - 1, day);
  const diffDays = Math.floor((targetDate - baseDate) / (1000 * 60 * 60 * 24));
  // 日干 = (基準日干 + 日数差) mod 10
  let kanIndex = ((6 + diffDays) % 10 + 10) % 10;
  return kanIndex;
}

    quote: '「人生一度きりだから」←それ言いすぎて信用を失ってる',
    statColors: ['#3b82f6','#ef4444','#22c55e','#22c55e','#ef4444']
  },
  { // 癸 (みずのと) - 水の陰
    kan: '癸', reading: 'みずのと', element: '水', yinyang: '陰',
    elClass: 'el-water', emoji: '🌧️',
    nature: '雨水',
    uraTitle: '考えすぎ自爆マシーン',
    uraDesc: '知性的で慈悲深い…けど裏の本性は、考えすぎて動けないネガティブの帝王。まだ起きてないことで勝手に病んでる。「もしかして嫌われた？」が1日10回頭をよぎる。でもその繊細さゆえに、人の痛みに誰よりも寄り添える。飲み会では急に黙って「大丈夫？」と聞かれるやつ。大丈夫じゃない。',
    stats: { 考えすぎ: 98, 共感力: 95, ネガティブ: 88, 知性: 90, 酔うと: 80 },
    quote: '「考えすぎだよ」←それが一番考えすぎるやつ',
    statColors: ['#3b82f6','#22c55e','#ef4444','#3b82f6','#f59e0b']
  }
];

const loadingMsgs = [
  '命式を解読中…',
  '陰陽五行を分析中…',
  '天干地支を照合中…',
  '裏の本性を暴いています…',
  '覚悟はいいですか…'
];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startDivine() {
  const y = parseInt(document.getElementById('sel-year').value);
  const m = parseInt(document.getElementById('sel-month').value);
  const d = parseInt(document.getElementById('sel-day').value);

  // 簡単なバリデーション
  const maxDay = new Date(y, m, 0).getDate();
  if (d > maxDay) {
    alert(`${y}年${m}月は${maxDay}日までです！`);
    return;
  }

  showScreen('loading-screen');

  let msgIdx = 0;
  const msgEl = document.getElementById('loading-msg');
  const interval = setInterval(() => {
    msgIdx++;
    if (msgIdx < loadingMsgs.length) {
      msgEl.textContent = loadingMsgs[msgIdx];
    }
  }, 600);

  setTimeout(() => {
    clearInterval(interval);
    const kanIndex = calcDayKan(y, m, d);
    showResult(kanIndex, y, m, d);
  }, 3200);
}

function showResult(kanIndex, y, m, d) {
  const data = kanData[kanIndex];
  const card = document.getElementById('result-card');

  // 十二支も計算（年支）
  const branches = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const branchIndex = ((y - 4) % 12 + 12) % 12;
  const yearBranch = branches[branchIndex];

  const statsHTML = Object.entries(data.stats).map(([label, val], i) => {
    const color = data.statColors[i];
    const barLabel = label === '酔うと' ? '酔うと暴走' : label;
    return `
      <div class="stat-row">
        <span class="stat-label">${barLabel}</span>
        <div class="stat-bar-bg">
          <div class="stat-bar" data-width="${val}" style="background: ${color};"></div>
        </div>
        <span class="stat-val">${val}%</span>
      </div>
    `;
  }).join('');

  card.innerHTML = `
    <div class="result-header">
      <div class="element-badge ${data.elClass}" style="background: var(--el-bg); color: var(--el-color);">
        <span class="element-icon">${data.emoji}</span>
        ${data.element}の${data.yinyang}（${data.nature}）
      </div>
      <div class="result-kan" style="color: var(--el-color);">${data.kan}</div>
      <div class="result-reading">${data.reading}｜${y}年${yearBranch}年生まれ</div>
    </div>
    <div class="result-body">
      <div class="ura-title-label">▼ あなたの裏性格</div>
      <div class="ura-title">${data.uraTitle}</div>
      <div class="ura-desc">${data.uraDesc}</div>
      <div class="stats-section">
        <div class="stats-title">▼ 裏パラメータ</div>
        ${statsHTML}
      </div>
    </div>
    <div class="ura-quote">「${data.quote.replace(/^「/, '').replace(/」$/, '')}」</div>
  `;

  showScreen('result-screen');

  // バーアニメーション
  setTimeout(() => {
    card.querySelectorAll('.stat-bar').forEach(bar => {
      bar.style.width = bar.dataset.width + '%';
    });
  }, 100);
}

function goBack() {
  showScreen('top-screen');
}
</script>
</body>
</html>
