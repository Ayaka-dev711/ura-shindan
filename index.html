<script>
(() => {
  const ySel = document.getElementById('sel-year');
  const mSel = document.getElementById('sel-month');
  const dSel = document.getElementById('sel-day');
  for (let y = 2010; y >= 1940; y--) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    if (y === 1990) o.selected = true;
    ySel.appendChild(o);
  }
  for (let m = 1; m <= 12; m++) {
    const o = document.createElement('option');
    o.value = m; o.textContent = String(m).padStart(2, '0');
    mSel.appendChild(o);
  }
  for (let d = 1; d <= 31; d++) {
    const o = document.createElement('option');
    o.value = d; o.textContent = String(d).padStart(2, '0');
    dSel.appendChild(o);
  }
})();

function calcDayKan(year, month, day) {
  const baseDate = new Date(1900, 0, 1);
  const targetDate = new Date(year, month - 1, day);
  const diffDays = Math.floor((targetDate - baseDate) / (1000 * 60 * 60 * 24));
  return ((6 + diffDays) % 10 + 10) % 10;
}

const loadingMsgs = [
  { emoji: '🔮', text: 'のぞいてます…' },
  { emoji: '✨', text: '本性を探索中…' },
  { emoji: '👀', text: 'もうすぐバレる…' },
  { emoji: '💫', text: '準備OK！' }
];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startDivine() {
  const y = parseInt(document.getElementById('sel-year').value);
  const m = parseInt(document.getElementById('sel-month').value);
  const d = parseInt(document.getElementById('sel-day').value);

  const maxDay = new Date(y, m, 0).getDate();
  if (d > maxDay) {
    alert(`${y}年${m}月は${maxDay}日までです！`);
    return;
  }

  showScreen('loading-screen');

  let idx = 0;
  const emojiEl = document.getElementById('loading-emoji');
  const msgEl = document.getElementById('loading-msg');
  emojiEl.textContent = loadingMsgs[0].emoji;
  msgEl.textContent = loadingMsgs[0].text;

  const interval = setInterval(() => {
    idx++;
    if (idx < loadingMsgs.length) {
      emojiEl.textContent = loadingMsgs[idx].emoji;
      msgEl.textContent = loadingMsgs[idx].text;
    }
  }, 700);

  setTimeout(() => {
    clearInterval(interval);
    const kanIndex = calcDayKan(y, m, d);
    showResult(kanIndex, y, m, d);
  }, 2800);
}

function showResult(kanIndex, y, m, d) {
  const data = kanData[kanIndex];
  const wrap = document.getElementById('result-wrap');

  const statsHTML = data.stats.map(s => `
    <div class="stat-row">
      <span class="stat-label">${s.label}</span>
      <div class="stat-bar-wrap">
        <div class="stat-bar-fill" data-width="${s.val}" style="--bar-color: ${s.color};"></div>
      </div>
      <span class="stat-val">${s.val}</span>
    </div>
  `).join('');

  wrap.innerHTML = `
    <div class="result-top">
      <div class="result-label">YOUR TYPE IS...</div>
      <div class="result-you">${y}.${String(m).padStart(2,'0')}.${String(d).padStart(2,'0')}</div>
    </div>

    <div class="type-card">
      <div class="type-emoji-bg">${data.emoji}</div>
      <div class="type-tag" style="background: ${data.tagBg};">${data.emoji} ${data.element}・${data.nature}</div>
      <div class="type-main-title">
        <span class="hl-under" style="--type-color: ${data.color};">${data.catchName}</span>
      </div>
      <div class="type-kan-line">
        <span class="kan-char">${data.kan}</span>
        <span>${data.reading}</span>
      </div>
      <div class="type-desc">${data.desc}</div>
    </div>

    <div class="stats-card">
      <div class="stats-title">▼ PARAMETERS</div>
      ${statsHTML}
    </div>

    <div class="quote-card">
      <div class="quote-mark">"</div>
      <div class="quote-text">${data.quote}</div>
    </div>

    <button class="btn-retry" onclick="goBack()">← もう一人やる</button>
  `;

  showScreen('result-screen');

  setTimeout(() => {
    wrap.querySelectorAll('.stat-bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.width + '%';
    });
  }, 200);
}

function goBack() {
  showScreen('top-screen');
}
</script>

</html>
